<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>待办清单</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;background:#faf5f7;color:#5a4050;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#8b6980,#6d5167);color:#f3e5f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.12)}
.sidebar-header h1{font-size:20px;color:#fff;display:flex;align-items:center;gap:8px}
.sidebar-header .date{font-size:12px;color:#dcc8d8;margin-top:6px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;margin-bottom:2px;color:#dcc8d8}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav-item .icon{font-size:16px;width:22px;text-align:center}
.nav-item .count{margin-left:auto;background:rgba(255,255,255,.12);padding:1px 8px;border-radius:10px;font-size:11px}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.12)}
.sidebar-footer .stats{font-size:11px;color:#dcc8d8;line-height:1.8}
.sidebar-footer .stats span{color:#fff;font-weight:600}
.sidebar-btns{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.sidebar-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:none;background:rgba(255,255,255,.08);color:#dcc8d8;transition:all .15s}
.sidebar-btn:hover{background:rgba(255,255,255,.16);color:#fff}
#importFile{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:20px 30px 16px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.main-title{font-size:18px;font-weight:700;color:#5a4050}
.main-actions{display:flex;gap:8px}
.btn-add{display:flex;align-items:center;gap:6px;padding:8px 18px;background:#9b7a8f;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-add:hover{background:#8b6980}
.btn-secondary{padding:8px 14px;background:#f8f0f4;border:1px solid #e8d8e2;border-radius:8px;font-size:13px;cursor:pointer;color:#8b6980}
.btn-secondary:hover{background:#f0e4ec}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="sidebar-header"><h1>&#x1F4CB; 待办清单</h1><div class="date" id="currentDate"></div></div>
<div class="sidebar-nav" id="sidebarNav"></div>
<div class="sidebar-footer">
<div class="stats" id="statsArea"></div>
<div class="sidebar-btns">
<button class="sidebar-btn" onclick="exportExcel()">&#x1F4BE; 导出Excel</button>
<button class="sidebar-btn" onclick="document.getElementById('importFile').click()">&#x1F4C2; 导入数据</button>
<button class="sidebar-btn" onclick="resetData()">&#x1F504; 重置默认</button>
<button class="sidebar-btn" id="notifyBtn" onclick="requestNotify()">&#x1F514; 开启提醒</button>
<input type="file" id="importFile" accept=".json" onchange="importData(event)">
</div></div></div>
<div class="main">
<div class="main-header">
<div class="main-title" id="mainTitle">渠道问题沟通</div>
<div class="main-actions">
<button class="btn-secondary" onclick="exportExcel()">&#x1F4CA; 导出Excel</button>
<button class="btn-add" onclick="showModal()">&#xFF0B; 新建待办</button>
</div></div>
<div class="main-body" id="mainBody"></div>
</div></div>
<style>
.main-body{flex:1;overflow-y:auto;padding:20px 30px 30px}
.section{background:#fff;border-radius:12px;margin-bottom:16px;border:1px solid #f0e4ec;overflow:hidden}
.section:hover{box-shadow:0 2px 12px rgba(139,105,128,.08)}
.section.drag-over{border-color:#9b7a8f;box-shadow:0 0 0 2px rgba(155,122,143,.15)}
.section-header{padding:14px 20px;display:flex;align-items:center;gap:10px;background:#faf5f7;border-bottom:1px solid #f0e4ec;cursor:pointer}
.section-icon{font-size:16px}.section-title{font-size:14px;font-weight:600;flex:1;color:#5a4050}
.section-count{font-size:11px;background:#f0e4ec;padding:2px 10px;border-radius:10px;color:#8b6980}
.section-toggle{font-size:12px;color:#b2bec3;transition:transform .2s}
.section-toggle.collapsed{transform:rotate(-90deg)}
.section-body{padding:4px 12px}.section-body.collapsed{display:none}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:18px;color:#2d3436}
.modal label{display:block;font-size:12px;color:#636e72;margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none}
.modal input:focus,.modal select:focus{border-color:#9b7a8f}
.ch-group-label{font-size:11px;font-weight:600;color:#8b6980;padding:8px 8px 2px;margin-top:4px;border-bottom:1px solid #f0e4ec}
.ch-group-noassign{font-size:11px;font-weight:600;color:#999;padding:8px 8px 2px;margin-top:4px;border-bottom:1px solid #f0f0f0}
</style>

<div class="modal-overlay" id="modal" onclick="onModalOverlayClick(event)">
<div class="modal" onclick="event.stopPropagation()">
<h3 id="modalTitle">新建待办</h3>
<label>待办内容</label><input type="text" id="inputTitle" placeholder="输入待办内容">
<label>分类</label><select id="inputSection" onchange="toggleChannelRow()"></select>
<div id="channelRow" style="display:none"><label>渠道</label><select id="inputChannel"></select></div>
<div style="display:flex;gap:12px"><div style="flex:1"><label>优先级</label><select id="inputPriority"><option value="normal">普通</option><option value="urgent">紧急</option><option value="pending">待确认</option></select></div>
<div style="flex:1"><label>到期日</label><input type="date" id="inputDue"></div></div>
<div style="display:flex;gap:12px"><div style="flex:1"><label>标签</label><input type="text" id="inputTag" placeholder="标签"></div>
<div style="flex:1"><label>内部跟进人</label><input type="text" id="inputAssignee" placeholder="跟进人"></div></div>
<label>最新进展</label><input type="text" id="inputProgress" placeholder="记录最新进展">
<label>关联邮件</label><input type="text" id="inputEmail" placeholder="邮件文件名">
<label>发件日期</label><input type="text" id="inputEmailDate" placeholder="如 2026-03">
<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
<button onclick="hideModal()" style="padding:9px 22px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:#f0f2f5;color:#636e72">取消</button>
<button id="modalConfirm" onclick="saveTodo()" style="padding:9px 22px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:#9b7a8f;color:#fff">添加</button>
</div></div></div>
