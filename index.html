function getFilteredSections(){if(activeTab==='all'||activeTab==='dashboard')return data.sections;return data.sections.filter(function(s){return getTabCategory(s.name)===activeTab})}
function isOverdue(d){if(!d)return false;var t=new Date();t.setHours(0,0,0,0);return new Date(d)<t}
function dueLabel(d){if(!d)return'';var v=new Date(d),t=new Date();t.setHours(0,0,0,0);var diff=Math.ceil((v-t)/86400000);if(diff<0)return'已过期'+(-diff)+'天';if(diff===0)return'今天到期';if(diff===1)return'明天到期';return diff+'天后到期'}

function renderDashboard(){
  var total=0,done=0,urgent=0,overdue=0,secStats={};
  SECTIONS.forEach(function(sn){secStats[sn]={total:0,done:0}});
  data.sections.forEach(function(s){var cat=getTabCategory(s.name);s.items.forEach(function(i){
    total++;if(i.done)done++;if(i.priority==='urgent'&&!i.done)urgent++;if(!i.done&&isOverdue(i.due))overdue++;
    if(secStats[cat]){secStats[cat].total++;if(i.done)secStats[cat].done++}
  })});
  var pending=total-done;
  var colors=['#6c5ce7','#00b894','#e17055','#fdcb6e','#0984e3'];
  var h='<div class="dashboard">';
  h+='<div class="dash-card"><div class="dash-icon">📋</div><div class="dash-num" style="color:#6c5ce7">'+total+'</div><div class="dash-lbl">总待办</div></div>';
  h+='<div class="dash-card"><div class="dash-icon">✅</div><div class="dash-num" style="color:#00b894">'+done+'</div><div class="dash-lbl">已完成</div><div class="dash-sub">'+(total?Math.round(done/total*100):0)+'%</div></div>';
  h+='<div class="dash-card"><div class="dash-icon">⏳</div><div class="dash-num" style="color:#0984e3">'+pending+'</div><div class="dash-lbl">待处理</div></div>';
  h+='<div class="dash-card"><div class="dash-icon">🔥</div><div class="dash-num" style="color:#e17055">'+urgent+'</div><div class="dash-lbl">紧急</div></div>';
  h+='<div class="dash-card"><div class="dash-icon">⚠️</div><div class="dash-num" style="color:#d63031">'+(overdue)+'</div><div class="dash-lbl">已过期</div></div>';
  h+='</div>';
  // Bar chart per section
  h+='<div class="dash-bar"><h4>各分类进度</h4>';
  SECTIONS.forEach(function(sn,idx){
    var st=secStats[sn],pct=st.total?Math.round(st.done/st.total*100):0;
    h+='<div class="bar-row"><div class="bar-label">'+sn+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+colors[idx%5]+'"></div></div><div class="bar-val">'+st.done+'/'+st.total+'</div></div>';
  });
  h+='</div>';
  // Channel breakdown for 渠道问题沟通
  var chSec=data.sections.find(function(s){return s.name==='渠道问题沟通'});
  if(chSec&&chSec.items.length){
    var chStats={};chSec.items.forEach(function(i){var ch=i.channel||'未分配';if(!chStats[ch])chStats[ch]={total:0,done:0};chStats[ch].total++;if(i.done)chStats[ch].done++});
    h+='<div class="dash-bar"><h4>渠道问题分布</h4>';
    Object.keys(chStats).sort().forEach(function(ch){
      var st=chStats[ch],pct=st.total?Math.round(st.done/st.total*100):0;
      h+='<div class="bar-row"><div class="bar-label">'+ch+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:#6c5ce7"></div></div><div class="bar-val">'+st.done+'/'+st.total+'</div></div>';
    });
    h+='</div>';
  }
  return h;
}
function renderNav(){
  var total=0,done=0,tc={};SECTIONS.forEach(function(s){tc[s]=0});tc['all']=0;tc['dashboard']=0;
  data.sections.forEach(function(s){var cat=getTabCategory(s.name);s.items.forEach(function(i){total++;if(i.done)done++;tc[cat]=(tc[cat]||0)+1})});
  tc['all']=total;tc['dashboard']=total;
  document.getElementById('sidebarNav').innerHTML=TABS.map(function(t){
    var cnt=tc[t.id]||0;
    return'<div class="nav-item '+(activeTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')"><span class="icon">'+t.icon+'</span>'+t.label+'<span class="count">'+cnt+'</span></div>';
  }).join('');
  document.getElementById('statsArea').innerHTML='总计 <span>'+total+'</span> · 已完成 <span>'+done+'</span> · 待处理 <span>'+(total-done)+'</span>';
  var now=new Date();document.getElementById('currentDate').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 '+['日','一','二','三','四','五','六'][now.getDay()];
  var tab=TABS.find(function(t){return t.id===activeTab});document.getElementById('mainTitle').textContent=tab?tab.label:'全部待办';
}

function renderItem(item,si,k){
  var od=!item.done&&isOverdue(item.due),dl=dueLabel(item.due);
  var details=[];
  if(item.progress)details.push('💬 '+item.progress);
  if(item.assignee)details.push('👤 '+item.assignee);
  if(item.email)details.push('📧 '+item.email+(item.emailDate?' ('+item.emailDate+')':''));
  var h='<div class="todo-item" draggable="true" ondragstart="onDragStart(event,'+si+','+k+')" ondragend="onDragEnd(event)" style="display:flex;align-items:flex-start;gap:12px;padding:12px 8px;border-radius:8px;cursor:grab">';
  h+='<div onclick="toggle('+si+','+k+')" style="width:20px;height:20px;border:2px solid '+(item.done?'#6c5ce7':'#d1d5db')+';border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:'+(item.done?'#6c5ce7':'transparent')+'">'+(item.done?'<span style="color:#fff;font-size:12px;font-weight:700">✓</span>':'')+'</div>';
  h+='<div style="flex:1;min-width:0"><div style="font-size:13px;line-height:1.5;'+(item.done?'text-decoration:line-through;color:#b2bec3':'color:#2d3436')+'">'+item.title+'</div>';
  h+='<div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">';
  if(item.channel)h+='<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:#e8eaf6;color:#3949ab">🏦 '+item.channel+'</span>';
  if(item.tag)h+='<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:#dfe6fd;color:#4a5dc7">'+item.tag+'</span>';
  h+='<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:'+(item.priority==='urgent'?'#fde8e8':item.priority==='pending'?'#fff3e0':'#e8f5e9')+';color:'+(item.priority==='urgent'?'#d93025':item.priority==='pending'?'#e65100':'#1b873f')+'">'+PL[item.priority]+'</span>';
  if(item.assignee)h+='<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:#e0f2fe;color:#0277bd">👤 '+item.assignee+'</span>';
  if(dl)h+='<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:'+(od?'#fde8e8':'#f3e8fd')+';color:'+(od?'#d93025':'#7b1fa2')+'">'+dl+'</span>';
  h+='</div>';
  if(details.length)h+='<div style="font-size:11px;color:#aaa;margin-top:3px;line-height:1.6">'+details.join(' · ')+'</div>';
  h+='</div><div style="display:flex;gap:2px;flex-shrink:0"><span onclick="editItem('+si+','+k+')" style="cursor:pointer;font-size:14px;padding:3px 5px;color:#ccc" title="编辑">✏️</span><span onclick="delItem('+si+','+k+')" style="cursor:pointer;font-size:14px;padding:3px 5px;color:#ccc" title="删除">✕</span></div></div>';
  return h;
}
function render(){
  renderNav();var c=document.getElementById('mainBody');
  if(activeTab==='dashboard'){c.innerHTML=renderDashboard();return}
  var sections=getFilteredSections();
  if(sections.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:#ccc">当前分类暂无待办事项</div>';return}
  var html='';
  for(var x=0;x<sections.length;x++){
    var s=sections[x],si=data.sections.indexOf(s),ic=s.items.length,dc=0;
    for(var j=0;j<s.items.length;j++){if(s.items[j].done)dc++}
    var collapsed=collapsedSections.has(si);
    html+='<div class="section" data-si="'+si+'" ondragover="onDragOver(event,'+si+')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'+si+')"><div class="section-header" onclick="toggleSection('+si+')"><span class="section-icon">'+s.icon+'</span><span class="section-title">'+s.name+'</span><span class="section-count">'+dc+'/'+ic+'</span><span class="section-toggle'+(collapsed?' collapsed':'')+'">▼</span></div><div class="section-body'+(collapsed?' collapsed':'')+'">';
    if(ic===0){html+='<div style="font-size:11px;color:#d1d5db;text-align:center;padding:12px">暂无待办事项</div>'}
    else if(s.name==='渠道问题沟通'){
      var groups={},noChannel=[];
      s.items.forEach(function(item,k){var ch=item.channel||'';if(ch){if(!groups[ch])groups[ch]=[];groups[ch].push({item:item,k:k})}else{noChannel.push({item:item,k:k})}});
      Object.keys(groups).sort().forEach(function(ch){
        html+='<div style="font-size:11px;font-weight:600;color:#3949ab;padding:8px 8px 2px;margin-top:4px;border-bottom:1px solid #f0f0f0">🏦 '+ch+'</div>';
        groups[ch].forEach(function(o){html+=renderItem(o.item,si,o.k)});
      });
      if(noChannel.length){html+='<div style="font-size:11px;font-weight:600;color:#999;padding:8px 8px 2px;margin-top:4px;border-bottom:1px solid #f0f0f0">未分配渠道</div>';noChannel.forEach(function(o){html+=renderItem(o.item,si,o.k)})}
    }else{for(var k=0;k<s.items.length;k++){html+=renderItem(s.items[k],si,k)}}
    html+='</div></div>';
  }
  c.innerHTML=html;
}
function switchTab(id){activeTab=id;render()}
function toggleSection(si){if(collapsedSections.has(si))collapsedSections.delete(si);else collapsedSections.add(si);render()}
function toggle(si,ii){data.sections[si].items[ii].done=!data.sections[si].items[ii].done;save();render()}
function delItem(si,ii){if(confirm('确定删除？')){data.sections[si].items.splice(ii,1);save();render()}}
function editItem(si,ii){showModal(data.sections[si].items[ii])}
function buildChannelSelect(val){
  var sel=document.getElementById('inputChannel');
  var h='<option value="">不区分渠道</option>';
  CHANNEL_DATA.forEach(function(g){
    if(g.items.length>0){
      h+='<optgroup label="'+g.group+'">';
      h+='<option value="'+g.group+'"'+(val===g.group?' selected':'')+'>'+g.group+'</option>';
      g.items.forEach(function(sub){h+='<option value="'+sub+'"'+(val===sub?' selected':'')+'>  '+sub+'</option>'});
      h+='</optgroup>';
    }else{h+='<option value="'+g.group+'"'+(val===g.group?' selected':'')+'>'+g.group+'</option>'}
  });
  sel.innerHTML=h;
}
function toggleChannelRow(){
  var row=document.getElementById('channelRow');
  if(row)row.style.display=(document.getElementById('inputSection').value==='渠道问题沟通')?'block':'none';
}
function showModal(item){
  editingItem=item||null;
  document.getElementById('modalTitle').textContent=item?'编辑待办':'新建待办';
  document.getElementById('modalConfirm').textContent=item?'保存':'添加';
  document.getElementById('inputTitle').value=item?item.title:'';
  document.getElementById('inputPriority').value=item?item.priority:'normal';
  document.getElementById('inputTag').value=item?(item.tag||''):'';
  document.getElementById('inputDue').value=item?(item.due||''):'';
  document.getElementById('inputProgress').value=item?(item.progress||''):'';
  document.getElementById('inputAssignee').value=item?(item.assignee||''):'';
  document.getElementById('inputEmail').value=item?(item.email||''):'';
  document.getElementById('inputEmailDate').value=item?(item.emailDate||''):'';
  var sel=document.getElementById('inputSection');
  sel.innerHTML=SECTIONS.map(function(sn){return'<option value="'+sn+'">'+sn+'</option>'}).join('');
  if(item){var sec=data.sections.find(function(s){return s.items.indexOf(item)>=0});if(sec)sel.value=sec.name}
  else if(activeTab!=='all'&&activeTab!=='dashboard'&&SECTIONS.indexOf(activeTab)>=0){sel.value=activeTab}
  buildChannelSelect(item?(item.channel||''):'');
  toggleChannelRow();
  document.getElementById('modal').classList.add('show');
  document.getElementById('inputTitle').focus();
}
function hideModal(){document.getElementById('modal').classList.remove('show');editingItem=null}
function saveTodo(){
  var title=document.getElementById('inputTitle').value.trim();if(!title)return;
  var sn=document.getElementById('inputSection').value;
  var pr=document.getElementById('inputPriority').value;
  var tag=document.getElementById('inputTag').value.trim();
  var due=document.getElementById('inputDue').value;
  var progress=document.getElementById('inputProgress').value.trim();
  var assignee=document.getElementById('inputAssignee').value.trim();
  var email=document.getElementById('inputEmail').value.trim();
  var emailDate=document.getElementById('inputEmailDate').value.trim();
  var channel=(sn==='渠道问题沟通')?document.getElementById('inputChannel').value:'';
  if(editingItem){
    var oldSi=-1,oldIi=-1;
    data.sections.forEach(function(s,si){var ii=s.items.indexOf(editingItem);if(ii>=0){oldSi=si;oldIi=ii}});
    editingItem.title=title;editingItem.priority=pr;editingItem.tag=tag;editingItem.due=due;
    editingItem.progress=progress;editingItem.assignee=assignee;editingItem.email=email;editingItem.emailDate=emailDate;editingItem.channel=channel;
    if(oldSi>=0&&data.sections[oldSi].name!==sn){data.sections[oldSi].items.splice(oldIi,1);var ns=data.sections.find(function(s){return s.name===sn});if(ns)ns.items.push(editingItem)}
  }else{
    var sec=data.sections.find(function(s){return s.name===sn});
    if(sec)sec.items.push({id:Date.now(),title:title,done:false,priority:pr,tag:tag,due:due,progress:progress,assignee:assignee,email:email,emailDate:emailDate,channel:channel});
  }
  save();render();hideModal();
}
function onDragStart(e,si,ii){dragSi=si;dragIi=ii;e.dataTransfer.effectAllowed='move'}
function onDragEnd(){dragSi=null;dragIi=null;document.querySelectorAll('.section').forEach(function(s){s.classList.remove('drag-over')})}
function onDragOver(e,si){e.preventDefault();document.querySelectorAll('.section').forEach(function(s){s.classList.remove('drag-over')});e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e,tsi){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragSi===null||dragIi===null||dragSi===tsi)return;var item=data.sections[dragSi].items.splice(dragIi,1)[0];data.sections[tsi].items.push(item);save();render()}
function exportExcel(){
  var rows=[];data.sections.forEach(function(s){s.items.forEach(function(item){rows.push({'分类':s.name,'渠道':item.channel||'','待办内容':item.title,'状态':item.done?'已完成':'待处理','优先级':PL[item.priority]||item.priority,'标签':item.tag||'','内部跟进人':item.assignee||'','到期日':item.due||'','最新进展':item.progress||'','关联邮件':item.email||'','发件日期':item.emailDate||''})})});
  if(!rows.length){alert('没有数据可导出');return}
  var ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:16},{wch:20},{wch:40},{wch:8},{wch:8},{wch:14},{wch:12},{wch:12},{wch:30},{wch:50},{wch:14}];
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'待办清单');
  var d=new Date();XLSX.writeFile(wb,'待办清单_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
}
function importData(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var imported=JSON.parse(ev.target.result);if(imported.sections){data=imported;save();render();alert('导入成功！')}else{alert('文件格式不正确')}}catch(err){alert('解析失败: '+err.message)}};reader.readAsText(file);e.target.value=''}
function resetData(){if(!confirm('确定重置为默认数据？当前数据将丢失！'))return;data=JSON.parse(JSON.stringify(defaultData));save();render()}
function requestNotify(){if(!('Notification' in window)){alert('浏览器不支持通知');return}Notification.requestPermission().then(function(p){if(p==='granted'){document.getElementById('notifyBtn').textContent='🔔 提醒已开启';checkDueNotify()}})}
function checkDueNotify(){if(Notification.permission!=='granted')return;var today=new Date();today.setHours(0,0,0,0);var todayStr=today.toISOString().slice(0,10);var msgs=[];data.sections.forEach(function(s){s.items.forEach(function(item){if(item.done||!item.due)return;if(item.due===todayStr)msgs.push('📌 今天到期: '+item.title);else if(isOverdue(item.due))msgs.push('⚠️ 已过期: '+item.title)})});if(msgs.length>0)new Notification('待办提醒',{body:msgs.join('\n')})}
document.getElementById('inputTitle').addEventListener('keydown',function(e){if(e.key==='Enter')saveTodo()});
document.getElementById('inputSection').addEventListener('change',toggleChannelRow);
render();
if(Notification.permission==='granted'){document.getElementById('notifyBtn').textContent='🔔 提醒已开启';checkDueNotify()}
setInterval(checkDueNotify,30*60*1000);

</script>
</body>
