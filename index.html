</div>

function render(){
  renderNav();var c=document.getElementById('mainBody');
  var sections=getFilteredSections();
  if(sections.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:#c4b0bc">当前分类暂无待办事项</div>';return}
  var html='';
  if(batchMode){
    var cnt=selectedItems.size;
    var isTrash=activeTab==='已删除';
    html+='<div class="batch-bar"><span>已选 '+cnt+' 项</span>';
    if(isTrash){html+='<button class="btn-batch btn-batch-restore" onclick="batchRestore()">↩️ 批量恢复</button><button class="btn-batch btn-batch-del" onclick="batchDelete()">🗑️ 彻底删除</button>'}
    else{html+='<button class="btn-batch btn-batch-del" onclick="batchDelete()">🗑️ 批量删除</button>'}
    html+='<button class="btn-batch btn-batch-cancel" onclick="toggleBatchMode()">取消</button></div>';
  }
  for(var x=0;x<sections.length;x++){
    var s=sections[x],si=data.sections.indexOf(s),ic=s.items.length,dc=0;
    for(var j=0;j<s.items.length;j++){if(s.items[j].done)dc++}
    var collapsed=collapsedSections.has(si);
    html+='<div class="section" data-si="'+si+'" ondragover="onDragOver(event,'+si+')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'+si+')"><div class="section-header" onclick="toggleSection('+si+')"><span class="section-icon">'+s.icon+'</span><span class="section-title">'+s.name+'</span><span class="section-count">'+dc+'/'+ic+'</span><span class="section-toggle'+(collapsed?' collapsed':'')+'">▼</span></div><div class="section-body'+(collapsed?' collapsed':'')+'">';
    if(ic===0){html+='<div style="font-size:11px;color:#c4b0bc;text-align:center;padding:12px">暂无待办事项</div>'}
    else if(s.name==='渠道问题沟通'){
      var groups={},noChannel=[];
      s.items.forEach(function(item,k){var ch=item.channel||'';if(ch){if(!groups[ch])groups[ch]=[];groups[ch].push({item:item,k:k})}else{noChannel.push({item:item,k:k})}});
      Object.keys(groups).sort().forEach(function(ch){
        html+='<div class="ch-group-label">🏦 '+ch+'</div>';
        groups[ch].forEach(function(o){html+=renderItem(o.item,si,o.k,s.name)});
      });
      if(noChannel.length){html+='<div class="ch-group-noassign">未分配渠道</div>';noChannel.forEach(function(o){html+=renderItem(o.item,si,o.k,s.name)})}
    }else{for(var k=0;k<s.items.length;k++){html+=renderItem(s.items[k],si,k,s.name)}}
    html+='</div></div>';
  }
  c.innerHTML=html;
}
function switchTab(id){activeTab=id;batchMode=false;selectedItems.clear();render()}
function toggleSection(si){if(collapsedSections.has(si))collapsedSections.delete(si);else collapsedSections.add(si);render()}
function toggle(si,ii){data.sections[si].items[ii].done=!data.sections[si].items[ii].done;save();render()}
function delItem(si,ii){
var sn=data.sections[si].name;
if(sn==='已删除'){if(confirm('彻底删除？')){data.sections[si].items.splice(ii,1);save();render()}return}
var item=data.sections[si].items.splice(ii,1)[0];
item._fromSection=sn;
var trash=data.sections.find(function(s){return s.name==='已删除'});
if(trash)trash.items.push(item);
save();render();
}
function restoreItem(si,ii){
var item=data.sections[si].items.splice(ii,1)[0];
var target=item._fromSection||'其他事项';delete item._fromSection;
var sec=data.sections.find(function(s){return s.name===target});
if(!sec)sec=data.sections.find(function(s){return s.name==='其他事项'});
if(sec)sec.items.push(item);
save();render();
}
function toggleBatchMode(){batchMode=!batchMode;selectedItems.clear();render()}
function toggleSelect(si,ii){var key=si+'_'+ii;if(selectedItems.has(key))selectedItems.delete(key);else selectedItems.add(key);render()}
function batchDelete(){
if(selectedItems.size===0)return;
var isTrash=activeTab==='已删除';
if(isTrash){if(!confirm('彻底删除 '+selectedItems.size+' 项？'))return}
var keys=Array.from(selectedItems).map(function(k){var p=k.split('_');return{si:+p[0],ii:+p[1]}});
keys.sort(function(a,b){return a.si===b.si?b.ii-a.ii:b.si-a.si});
var trash=data.sections.find(function(s){return s.name==='已删除'});
keys.forEach(function(k){
if(isTrash){data.sections[k.si].items.splice(k.ii,1)}
else{var item=data.sections[k.si].items.splice(k.ii,1)[0];item._fromSection=data.sections[k.si].name;if(trash)trash.items.push(item)}
});
selectedItems.clear();save();render();
}
function batchRestore(){
if(selectedItems.size===0)return;
var keys=Array.from(selectedItems).map(function(k){var p=k.split('_');return{si:+p[0],ii:+p[1]}});
keys.sort(function(a,b){return a.si===b.si?b.ii-a.ii:b.si-a.si});
keys.forEach(function(k){
var item=data.sections[k.si].items.splice(k.ii,1)[0];
var target=item._fromSection||'其他事项';delete item._fromSection;
var sec=data.sections.find(function(s){return s.name===target});
if(!sec)sec=data.sections.find(function(s){return s.name==='其他事项'});
if(sec)sec.items.push(item);
});
selectedItems.clear();save();render();
}

  document.getElementById('inputPlanDate').value=item?(item.planDate||''):'';
  document.getElementById('inputRequester').value=item?(item.requester||''):'';
  document.getElementById('inputReqProgress').value=item?(item.reqProgress||''):'';
  // populate other fields
  document.getElementById('inputOtherPriority').value=item?item.priority:'normal';
  document.getElementById('inputOtherDue').value=item?(item.due||''):'';
  document.getElementById('inputOtherTag').value=item?(item.tag||''):'';
  document.getElementById('inputOtherAssignee').value=item?(item.assignee||''):'';
  document.getElementById('inputOtherProgress').value=item?(item.progress||''):'';
  onSectionChange();
  document.getElementById('modal').classList.add('show');
  document.getElementById('inputTitle').focus();
}
function hideModal(){document.getElementById('modal').classList.remove('show');editingItem=null}
function saveTodo(){
  var title=document.getElementById('inputTitle').value.trim();if(!title)return;
  var sn=document.getElementById('inputSection').value;
  var itemData={id:Date.now(),title:title,done:false};
  if(isReqSection(sn)){
    itemData.priority=document.getElementById('inputReqPriority').value;
    itemData.reqCategory=document.getElementById('inputReqCategory').value.trim();
    itemData.planDate=document.getElementById('inputPlanDate').value;
    itemData.requester=document.getElementById('inputRequester').value.trim();
    itemData.reqProgress=document.getElementById('inputReqProgress').value.trim();
  }else if(isCommSection(sn)){
    itemData.priority=document.getElementById('inputPriority').value;
    itemData.tag=document.getElementById('inputTag').value.trim();
    itemData.due=document.getElementById('inputDue').value;
    itemData.progress=document.getElementById('inputProgress').value.trim();
    itemData.assignee=document.getElementById('inputAssignee').value.trim();
    itemData.email=document.getElementById('inputEmail').value.trim();
    itemData.emailDate=document.getElementById('inputEmailDate').value.trim();
    itemData.channel=document.getElementById('inputChannel').value;
  }else{
    itemData.priority=document.getElementById('inputOtherPriority').value;
    itemData.tag=document.getElementById('inputOtherTag').value.trim();
    itemData.due=document.getElementById('inputOtherDue').value;
    itemData.progress=document.getElementById('inputOtherProgress').value.trim();
    itemData.assignee=document.getElementById('inputOtherAssignee').value.trim();
  }
  if(editingItem){
    var oldSi=-1,oldIi=-1;
    data.sections.forEach(function(s,si){var ii=s.items.indexOf(editingItem);if(ii>=0){oldSi=si;oldIi=ii}});
    Object.assign(editingItem,itemData);
    editingItem.id=editingItem.id||Date.now();
    if(oldSi>=0&&data.sections[oldSi].name!==sn){data.sections[oldSi].items.splice(oldIi,1);var ns=data.sections.find(function(s){return s.name===sn});if(ns)ns.items.push(editingItem)}
  }else{
    var sec=data.sections.find(function(s){return s.name===sn});
    if(sec)sec.items.push(itemData);
  }
  save();render();hideModal();
}
function onDragStart(e,si,ii){dragSi=si;dragIi=ii;e.dataTransfer.effectAllowed='move'}
function onDragEnd(){dragSi=null;dragIi=null;document.querySelectorAll('.section').forEach(function(s){s.classList.remove('drag-over')})}
function onDragOver(e,si){e.preventDefault();document.querySelectorAll('.section').forEach(function(s){s.classList.remove('drag-over')});e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e,tsi){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(dragSi===null||dragIi===null||dragSi===tsi)return;var item=data.sections[dragSi].items.splice(dragIi,1)[0];data.sections[tsi].items.push(item);save();render()}
function exportExcel(){
  var rows=[];data.sections.forEach(function(s){s.items.forEach(function(item){
    var row={'分类':s.name,'待办内容':item.title,'状态':item.done?'已完成':'待处理','优先级':PL[item.priority]||item.priority};
    if(isReqSection(s.name)){
      row['分类标签']=item.reqCategory||'';row['计划上线日期']=item.planDate||'';row['需求提出人']=item.requester||'';row['进展情况']=item.reqProgress||'';
    }else{
      row['渠道']=item.channel||'';row['标签']=item.tag||'';row['内部跟进人']=item.assignee||'';row['到期日']=item.due||'';row['最新进展']=item.progress||'';row['关联邮件']=item.email||'';row['发件日期']=item.emailDate||'';
    }
    rows.push(row);
  })});
  if(!rows.length){alert('没有数据可导出');return}
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'待办清单');
  var d=new Date();XLSX.writeFile(wb,'待办清单_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
}
function importData(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var imported=JSON.parse(ev.target.result);if(imported.sections){data=imported;save();render();alert('导入成功！')}else{alert('文件格式不正确')}}catch(err){alert('解析失败: '+err.message)}};reader.readAsText(file);e.target.value=''}
function resetData(){if(!confirm('确定重置为默认数据？当前数据将丢失！'))return;data=JSON.parse(JSON.stringify(defaultData));save();render()}
function requestNotify(){if(!('Notification' in window)){alert('浏览器不支持通知');return}Notification.requestPermission().then(function(p){if(p==='granted'){document.getElementById('notifyBtn').textContent='🔔 提醒已开启';checkDueNotify()}})}
function checkDueNotify(){if(Notification.permission!=='granted')return;var today=new Date();today.setHours(0,0,0,0);var todayStr=today.toISOString().slice(0,10);var msgs=[];data.sections.forEach(function(s){s.items.forEach(function(item){if(item.done)return;var d=isReqSection(s.name)?item.planDate:item.due;if(!d)return;if(d===todayStr)msgs.push('📌 今天到期: '+item.title);else if(isOverdue(d))msgs.push('⚠️ 已过期: '+item.title)})});if(msgs.length>0)new Notification('待办提醒',{body:msgs.join('\n')})}
document.getElementById('inputTitle').addEventListener('keydown',function(e){if(e.key==='Enter')saveTodo()});
render();
if(Notification.permission==='granted'){document.getElementById('notifyBtn').textContent='🔔 提醒已开启';checkDueNotify()}
setInterval(checkDueNotify,30*60*1000);
</script>
